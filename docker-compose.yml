services:
  oracle-free:
    image: gvenzl/oracle-free:23-slim
    container_name: quindioflix-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle_2026
      APP_USER: ${ORACLE_USERNAME:-QUINDIOFLIX_APP}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD:-QuindioFlix_2026}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20

  backend:
    build: .
    container_name: quindioflix-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-oracle}
      ORACLE_URL: ${ORACLE_URL:-jdbc:oracle:thin:@oracle-free:1521/FREEPDB1}
      ORACLE_USERNAME: ${ORACLE_USERNAME:-QUINDIOFLIX_APP}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-QuindioFlix_2026}
      JWT_SECRET: ${JWT_SECRET:-CAMBIAR_ESTE_SECRETO_EN_PRODUCCION_MINIMO_32_CARACTERES_2026}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-480}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200,http://localhost:80,http://frontend:80}
      CUENTAS_VENCIDAS_CRON: ${CUENTAS_VENCIDAS_CRON:-0 0 2 * * *}
    depends_on:
      oracle-free:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: nginx:alpine
    container_name: quindioflix-frontend
    profiles:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  oracle-data:
