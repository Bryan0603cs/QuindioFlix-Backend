services:
  oracle-free:
    image: gvenzl/oracle-free:23-slim
    container_name: quindioflix-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle_2026
      APP_USER: QUINDIOFLIX_APP
      APP_USER_PASSWORD: QuindioFlix_2026
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20

  backend:
    build: .
    container_name: quindioflix-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: oracle
      ORACLE_URL: jdbc:oracle:thin:@oracle-free:1521/FREEPDB1
      ORACLE_USERNAME: QUINDIOFLIX_APP
      ORACLE_PASSWORD: QuindioFlix_2026
      JWT_SECRET: ${JWT_SECRET:-CAMBIAR_ESTE_SECRETO_EN_PRODUCCION_MINIMO_32_CARACTERES_2026}
      JWT_EXPIRATION_MINUTES: 480
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200,http://localhost:80,http://frontend:4200,http://frontend:80
    depends_on:
      oracle-free:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: quindioflix-frontend
    profiles:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  oracle-data:
