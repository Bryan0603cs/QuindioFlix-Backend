server:
  port: 8080

spring:
  application:
    name: quindioflix-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  security:
    jwt-secret: ${JWT_SECRET:QuindioFlixProyectoFinalBasesDatosII2026SecretKeySuperLargaCambiarEnProduccion}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:80,http://frontend:4200,http://frontend:80}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
